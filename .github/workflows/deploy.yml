name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: List changed images (dist paths)
        run: |
          BEFORE="${{ github.event.before }}"
          [ "$BEFORE" = "0000000000000000000000000000000000000000" ] && BEFORE=HEAD~1
          [ -z "$BEFORE" ] && BEFORE=HEAD~1
          git diff --name-only "$BEFORE" ${{ github.sha }} 2>/dev/null || git diff --name-only HEAD~1 HEAD \
            | grep -iE '\.(webp|png|jpg|jpeg|gif)$' \
            | sed 's|^public/||' \
            | while read -r p; do [ -f "dist/$p" ] && echo "$p"; done \
            > dist/changed-images.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TENCENTCLOUD }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to server
        run: |
          TARGET="${{ secrets.USERNAME }}@${{ secrets.HOST }}:/www/wwwroot/nani-kiru.minjer.top"
          # --no-perms --no-owner --no-group: avoid exit 23 when server cannot set attrs
          # Full sync except bulk image dir; server keeps existing images there
          rsync -avz --no-perms --no-owner --no-group --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            -f 'P .user.ini' \
            -f 'P .well-known/' \
            -f 'P .htaccess' \
            -f 'P 404.html' \
            --exclude='data/categories/*/questions/' \
            ./ "$TARGET/"
          # Sync only images changed in this commit
          if [ -s changed-images.txt ]; then
            rsync -avz --no-perms --no-owner --no-group \
              -e "ssh -o StrictHostKeyChecking=no" \
              --files-from=changed-images.txt ./ "$TARGET/"
          fi
